<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Skin selector overlay -->
  <div id="skin-overlay" class="hidden">
    <div id="skin-box">
      <h2>SNAKE</h2>
      <p>CHOOSE YOUR COLOR</p>
      <div id="skin-swatches"></div>
      <button id="btn-play">PLAY</button>
    </div>
  </div>

  <!-- Name entry modal -->
  <div id="modal-overlay">
    <div id="modal">
      <h2>NEW HIGH SCORE!</h2>
      <p>You made the leaderboard</p>
      <div class="final-score" id="modal-score">0</div>
      <input id="name-input" type="text" maxlength="16" placeholder="Enter your name" spellcheck="false">
      <div id="modal-buttons">
        <button class="modal-btn" id="btn-save">SAVE</button>
        <button class="modal-btn" id="btn-skip">SKIP</button>
      </div>
    </div>
  </div>

  <!-- Game -->
  <div id="game-col">
    <h1>SNAKE</h1>
    <div id="scoreboard">
      <div><span>SCORE </span><strong id="score">0</strong></div>
      <div><span>BEST </span><strong id="best">0</strong></div>
    </div>
    <canvas id="canvas" width="400" height="400"></canvas>
    <div id="message">Press WASD or arrow keys to start</div>
    <button id="btn-skin">&#9632; COLOR</button>
  </div>

  <!-- Leaderboard -->
  <div id="leaderboard-col">
    <h2>LEADERBOARD</h2>
    <ul id="lb-list"></ul>
    <p id="lb-empty">No scores yet</p>
    <button id="lb-file-btn">LINK scores.json</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
